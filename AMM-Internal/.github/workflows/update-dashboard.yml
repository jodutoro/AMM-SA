name: Update Dashboard

on:
  push:
    branches: [main]
    paths:
      - 'transcripts/**'
      - 'data/**'
      - 'scripts/ingest.py'
  workflow_dispatch: # allow manual trigger from GitHub UI

jobs:
  ingest:
    runs-on: ubuntu-latest
    permissions:
      contents: write

    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: pip install -r scripts/requirements.txt

      - name: Run ingest pipeline
        env:
          ANTHROPIC_API_KEY: ${{ secrets.ANTHROPIC_API_KEY }}
        run: python3 scripts/ingest.py

      - name: Commit updated data.json (if changed)
        run: |
          git config user.name "amm-bot"
          git config user.email "amm-bot@users.noreply.github.com"
          if ! git diff --quiet dashboard/data.json; then
            git add dashboard/data.json
            git commit -m "chore(auto): ingest transcript updates → data.json [skip ci]"
            git push
          else
            echo "No changes to data.json — skipping commit"
          fi

  deploy:
    needs: ingest
    runs-on: ubuntu-latest
    permissions:
      pages: write
      id-token: write
    environment:
      name: github-pages
      url: ${{ steps.deployment.outputs.page_url }}

    steps:
      - uses: actions/checkout@v4
        with:
          ref: main  # pull the latest (may include ingest commit)

      - uses: actions/upload-pages-artifact@v3
        with:
          path: './dashboard'

      - name: Deploy to GitHub Pages
        id: deployment
        uses: actions/deploy-pages@v4

<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64">
  <defs>
    <linearGradient id="bg" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#E8899A"/>
      <stop offset="100%" stop-color="#9E3D56"/>
    </linearGradient>
    <radialGradient id="glow" cx="50%" cy="30%" r="60%">
      <stop offset="0%" stop-color="#FDF0F3" stop-opacity="0.25"/>
      <stop offset="100%" stop-color="#9E3D56" stop-opacity="0"/>
    </radialGradient>
  </defs>
  <!-- Background circle -->
  <circle cx="32" cy="32" r="32" fill="url(#bg)"/>
  <circle cx="32" cy="32" r="32" fill="url(#glow)"/>
  <!-- Decorative petal top -->
  <ellipse cx="32" cy="10" rx="4" ry="6" fill="rgba(255,255,255,0.30)" transform="rotate(-15 32 10)"/>
  <ellipse cx="38" cy="11" rx="3" ry="5" fill="rgba(255,255,255,0.20)" transform="rotate(15 38 11)"/>
  <!-- LN monogram -->
  <text
    x="32" y="40"
    font-family="Georgia, 'Times New Roman', serif"
    font-size="26"
    font-weight="bold"
    font-style="italic"
    fill="white"
    text-anchor="middle"
    letter-spacing="1"
    opacity="0.97"
  >LN</text>
  <!-- Subtle bottom arc decoration -->
  <path d="M 18 52 Q 32 58 46 52" stroke="rgba(255,255,255,0.35)" stroke-width="1.5" fill="none" stroke-linecap="round"/>
</svg>

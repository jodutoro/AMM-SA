# Example: Monthly SEO Maintenance
# This is a filled-in example for an existing client's second month.
# Requires a completed seo-onboarding plan — IDs carry over.
# To use: copy workflows/monthly-seo.yaml to
# plans/clients/{your-client}/2026-05-monthly-seo.yaml and fill in your values.

template: monthly-seo
version: "1.0"
description: "Monthly SEO cycle — suggestions, schema, indexing, content expansion, grading"

# ── Client Info ───────────────────────────────────────────────────────────────
client: "Sunrise Home Services"
domain: "sunrisehomeservices.com"
period: "2026-05"
status: in_progress

# ── IDs (carried over from onboarding) ────────────────────────────────────────
ids:
  otto_project_id: "proj_a1b2c3d4"     # from onboarding
  brand_vault_id: "vault_i9j0k1l2"     # from onboarding
  topical_map_id: ""                   # new one created this month

# ── Configuration ─────────────────────────────────────────────────────────────
config:
  monthly_keyword: "bathroom remodel miami"
  pillar_url: "https://sunrisehomeservices.com/bathroom-remodel"
  articles_to_generate: 4
  articles_to_grade: 4                 # grade last month's 4 articles

# ── Steps ─────────────────────────────────────────────────────────────────────
steps:
  - id: 1
    name: "Get issues overview + reprocess autopilot"
    tool: OTTO_Project_Management
    operations:
      - op: get_otto_project_details
        params:
          project_id: "proj_a1b2c3d4"
      - op: manual_reprocess_autopilot
        params:
          project_id: "proj_a1b2c3d4"
    status: completed
    result: "Project health improved: 62 → 71. 28 new suggestions generated."

  - id: 2
    name: "Review + apply OTTO suggestions"
    tool: OTTO_Suggestion_Management
    operations:
      - op: edit_suggestions_bulk
        params:
          project_id: "proj_a1b2c3d4"
          action: apply_all_approved
    status: completed
    result: "24 of 28 suggestions applied. 4 flagged for manual review."
    depends_on: [1]

  - id: 3
    name: "Generate + deploy pending schemas"
    tool: OTTO_Schema_Markup
    operations:
      - op: list_domain_level_schemas
        params:
          project_id: "proj_a1b2c3d4"
      - op: deploy_domain_level_schema
        params:
          project_id: "proj_a1b2c3d4"
    status: completed
    result: "3 schemas deployed: LocalBusiness, Service, FAQPage."
    depends_on: [1]

  - id: 4
    name: "Check + fix indexing issues"
    tool: OTTO_Indexing_Management
    operations:
      - op: get_indexing_sitemaps
        params:
          project_id: "proj_a1b2c3d4"
      - op: select_urls_for_indexing
        params:
          project_id: "proj_a1b2c3d4"
    status: completed
    result: "12 URLs submitted for indexing. Sitemap: 847 URLs, 0 errors."
    depends_on: [1]

  - id: 5
    name: "Create / expand topical map"
    tool: Topical_Maps_Tools
    operations:
      - op: create_topical_map
        params:
          keyword: "bathroom remodel miami"
          domain: "sunrisehomeservices.com"
          pillar_url: "https://sunrisehomeservices.com/bathroom-remodel"
    output_key: ids.topical_map_id
    status: pending

  - id: 6
    name: "Generate articles from topical map"
    tool: Content_Generation_Tool
    description: "4-step workflow per article"
    status: pending
    depends_on: [5]

  - id: 7
    name: "Run content grader on last month's articles"
    tool: Article_Management_Tools
    status: pending

# ── Results ───────────────────────────────────────────────────────────────────
results:
  - steps_completed: 4
  - steps_pending: 3
  - notes: "Steps 5-7 scheduled for 2026-05-15 after client approves new keyword"

# ── Output Summary (as shown after steps 1-4) ─────────────────────────────────
# ⏳ Sunrise Home Services — Monthly SEO · 2026-05
#
# 🔧  Suggestions     24 applied (4 flagged for review)               View →
# 📋  Schema          3 schemas deployed                               View →
# 🔗  Indexing        12 URLs submitted                                View →
# 🗺️  Topical Map     pending approval                                —
# ✍️  Content         pending                                         —
# 📊  Content Grader  pending                                         —
#
# 4 actions completed · 3 pending

# Example: New Client SEO Onboarding
# This is a filled-in example so you can see what a real plan looks like.
# To use for a real client: copy workflows/seo-onboarding.yaml to
# plans/clients/{your-client}/2026-04-seo-onboarding.yaml and fill in your values.

template: new-client-seo
version: "1.0"
description: "Full SEO onboarding — project setup, audit, brand vault, keyword research, topical map, first content batch"

# ── Client Info ───────────────────────────────────────────────────────────────
client: "Sunrise Home Services"
domain: "sunrisehomeservices.com"
period: "2026-04"
status: completed

# ── IDs (filled as each step completed) ───────────────────────────────────────
ids:
  otto_project_id: "proj_a1b2c3d4"
  audit_id: "audit_e5f6g7h8"
  brand_vault_id: "vault_i9j0k1l2"
  keyword_research_id: "kwr_m3n4o5p6"
  topical_map_id: "tm_q7r8s9t0"

# ── Configuration ─────────────────────────────────────────────────────────────
config:
  pillar_keyword: "home renovation services miami"
  pillar_url: "https://sunrisehomeservices.com/services"
  target_location: "Miami, FL"
  articles_to_generate: 4
  voice_profile: "professional_friendly"   # chosen from brand vault options

# ── Steps ─────────────────────────────────────────────────────────────────────
steps:
  - id: 1
    name: "Create & verify OTTO project"
    tool: project_management
    operations:
      - op: engage_otto_project
        params:
          domain: "sunrisehomeservices.com"
      - op: verify_otto_installation
        params:
          project_id: "proj_a1b2c3d4"
    output_key: ids.otto_project_id
    status: completed
    result: "OTTO project created and verified. 847 pages indexed."

  - id: 2
    name: "Create site audit"
    tool: audit_management
    operations:
      - op: create_audit
        params:
          project_id: "proj_a1b2c3d4"
    output_key: ids.audit_id
    status: completed
    result: "Audit complete. 312 issues found — 48 critical, 156 warnings."
    depends_on: [1]

  - id: 3
    name: "Get holistic SEO pillar scores"
    tool: holistic_audit
    operations:
      - op: get_holistic_seo_pillar_scores
        params:
          domain: "sunrisehomeservices.com"
    output: pillar_scores
    status: completed
    result: "Technical: 62 | Content: 44 | Authority: 38 | UX: 71"
    depends_on: [2]

  - id: 4
    name: "Create brand vault + voice profile"
    tool: brand_vault
    operations:
      - op: create_brand_vault
        params:
          domain: "sunrisehomeservices.com"
          client_name: "Sunrise Home Services"
      - op: select_voice_profile
        params:
          brand_vault_id: "vault_i9j0k1l2"
          profile: "professional_friendly"
    output_key: ids.brand_vault_id
    status: completed
    result: "Brand vault created. Voice profile: professional_friendly."

  - id: 5
    name: "Build keyword research project"
    tool: keyword_research
    operations:
      - op: create_keyword_research_project
        params:
          domain: "sunrisehomeservices.com"
          keyword: "home renovation services miami"
          location: "Miami, FL"
    output_key: ids.keyword_research_id
    status: completed
    result: "1,240 keywords discovered. 48 high-intent opportunities."
    depends_on: [1]

  - id: 6
    name: "Create topical map from pillar keyword"
    tool: topical_maps
    operations:
      - op: create_topical_map
        params:
          keyword: "home renovation services miami"
          domain: "sunrisehomeservices.com"
          pillar_url: "https://sunrisehomeservices.com/services"
    output_key: ids.topical_map_id
    status: completed
    result: "Topical map created. 6 clusters, 42 article titles."
    depends_on: [5]

  - id: 7
    name: "Generate first article batch from topical map"
    tool: content_generation
    description: "4-step workflow per article"
    status: completed
    result: "4 articles generated. Avg content score: 87/100."
    depends_on: [4, 6]

# ── Results ───────────────────────────────────────────────────────────────────
results:
  - completed_at: "2026-04-10T14:32:00Z"
  - actions_completed: 18
  - actions_failed: 0
  - notes: "Content authority score low — prioritize link building next month"

# ── Output Summary (as shown to member after run) ──────────────────────────────
# ✅ Sunrise Home Services — SEO Onboarding · 2026-04
#
# 🏗️  OTTO Project    installed + verified · 847 pages               View →
# 🔍  Site Audit      312 issues · Tech 62 / Content 44 / Auth 38    View →
# 🏷️  Brand Vault     created · voice: professional_friendly         View →
# 🔑  Keywords        1,240 discovered · 48 high-intent              View →
# 🗺️  Topical Map     6 clusters · 42 article titles                 View →
# ✍️  Content         4 articles · avg score 87/100                  View →
#
# 18 actions completed · 0 failed

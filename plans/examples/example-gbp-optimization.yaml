# Example: GBP Profile Optimization
# This is a filled-in example for a first-time GBP setup.
# To use: copy workflows/gbp-optimization.yaml to
# plans/clients/{your-client}/2026-04-gbp-optimization.yaml and fill in your values.

template: gbp-optimization
version: "1.0"
description: "Full GBP profile optimization — recommendations, categories, services, attributes, AI description, deploy"

# ── Client Info ───────────────────────────────────────────────────────────────
client: "Coastal Dental Group"
domain: "coastaldentalgroup.com"
period: "2026-04"
status: completed

# ── IDs ───────────────────────────────────────────────────────────────────────
ids:
  gbp_location_id: "12345678"     # found via gbp_locations_crud → list_locations

# ── Configuration ─────────────────────────────────────────────────────────────
config:
  primary_category: "Dental Clinic"
  additional_categories:
    - "Cosmetic Dentist"
    - "Emergency Dental Service"
    - "Orthodontist"
  services:
    - name: "Teeth Whitening"
      description: ""              # left blank — AI generated the description
    - name: "Invisalign"
      description: ""
    - name: "Dental Implants"
      description: ""
    - name: "Emergency Dental Care"
      description: ""
  auto_apply_recommendations: true
  deploy_after_changes: true

# ── Steps ─────────────────────────────────────────────────────────────────────
steps:
  - id: 1
    name: "Load location + get current state"
    tool: gbp_locations_crud
    status: completed
    result: "Location synced. 312 reviews, 4.8★ avg. 2,100 monthly views."

  - id: 2
    name: "Generate AI recommendations + bulk apply"
    tool: gbp_locations_recommendations
    status: completed
    result: "31 recommendations generated. 28 applied (CHANGE + ADD). 3 DELETE-type skipped for manual review."

  - id: 3
    name: "Fix categories (primary + additional)"
    tool: gbp_locations_categories_crud
    status: completed
    result: "Primary: Dental Clinic. Added 3 additional categories."
    depends_on: [2]

  - id: 4
    name: "Add / update services with AI descriptions"
    tool: gbp_locations_services_crud
    status: completed
    result: "4 services added with AI-generated descriptions."
    depends_on: [2]

  - id: 5
    name: "Add missing attributes"
    tool: gbp_locations_attributes_crud
    status: completed
    result: "9 attributes added: wheelchair accessible, accepts new patients, online appointments, etc."
    depends_on: [2]

  - id: 6
    name: "Generate AI description + deploy all changes"
    tool: gbp_locations_deployment
    status: completed
    result: "AI description generated (280 chars). All changes deployed to Google."
    depends_on: [3, 4, 5]

# ── Results ───────────────────────────────────────────────────────────────────
results:
  - completed_at: "2026-04-08T10:15:00Z"
  - actions_completed: 12
  - actions_failed: 0
  - notes: "Review the 3 skipped DELETE recommendations manually in the GBP dashboard"

# ── Output Summary (as shown to member after run) ──────────────────────────────
# ✅ Coastal Dental Group — GBP Profile Optimization · 2026-04
#
# 📍  Location        synced · 312 reviews · 4.8★ · 2,100 views/mo   View →
# 🤖  Recommendations 28 applied (3 DELETE-type skipped)              View →
# 🏷️  Categories      Dental Clinic + 3 additional                    View →
# 🛎️  Services        4 services added with AI descriptions           View →
# ✅  Attributes      9 attributes filled in                          View →
# 📝  Description     AI description generated + deployed             View →
#
# 12 actions completed · 0 failed
# ⚠️  Manual: review 3 DELETE-type recommendations in GBP dashboard
